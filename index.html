<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fórmula Google Ads</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
    background-color: #f8f8f8;
}
.container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
    background-color: #ffffff;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
h1 {
    color: #333333;
    margin-bottom: 20px;
}
p {
    color: #555555;
    font-size: 16px;
    margin-bottom: 20px;
}
img {
    max-width: 100%;
    height: auto;
    margin-bottom: 20px;
}
.btn {
    display: inline-block;
    background-color: #ff6600; /* laranja chamativo */
    color: #ffffff;
    text-decoration: none;
    padding: 20px 40px;
    font-size: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    transition: background-color 0.3s;
}
.btn:hover {
    background-color: #e65c00;
}
@media screen and (max-width: 480px) {
    .btn {
        font-size: 22px;
        padding: 25px 0;
        width: 90%;
    }
}
</style>
</head>
<body>
<div class="container">
    <h1>Fórmula Google Ads</h1>
    <p>Aprenda a gerar resultados reais no Google Ads de forma simples e prática.</p>
    <img src="https://via.placeholder.com/500x300.png?text=Produto+Exemplo" alt="Produto">
    <br>
    <a href="https://pay.kiwify.com.br/4cDK20b?afid=koPAVcZp" class="btn">Quero Começar Agora</a>
</div>
</body>
</html>
